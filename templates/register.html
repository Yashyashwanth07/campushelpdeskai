{% extends 'base.html' %}
{% block title %}Register — SmartCampus AI{% endblock %}

{% block content %}
<section class="auth-section py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="auth-card card border-0 shadow-lg">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <div class="auth-icon mb-3">
                                <i class="bi bi-person-plus"></i>
                            </div>
                            <h3 class="fw-bold">Create Account</h3>
                            <p class="text-muted">Join SmartCampus AI as a student</p>
                        </div>

                        <form method="POST" action="{{ url_for('register') }}">
                            <div class="mb-3">
                                <label for="name" class="form-label fw-medium">
                                    <i class="bi bi-person me-1"></i>Full Name
                                </label>
                                <input type="text" class="form-control form-control-lg" id="name" 
                                       name="name" placeholder="Enter your full name" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label fw-medium">
                                    <i class="bi bi-envelope me-1"></i>Email Address
                                </label>
                                <input type="email" class="form-control form-control-lg" id="email" 
                                       name="email" placeholder="you@college.edu" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label fw-medium">
                                    <i class="bi bi-lock me-1"></i>Password
                                </label>
                                <input type="password" class="form-control form-control-lg" id="password" 
                                       name="password" placeholder="Create a password" required minlength="6">
                            </div>
                            <div class="mb-4">
                                <label for="confirm_password" class="form-label fw-medium">
                                    <i class="bi bi-lock-fill me-1"></i>Confirm Password
                                </label>
                                <input type="password" class="form-control form-control-lg" id="confirm_password" 
                                       name="confirm_password" placeholder="Confirm your password" required>
                            </div>
                            <button type="submit" class="btn btn-accent btn-lg w-100 rounded-pill mb-3">
                                <i class="bi bi-person-plus me-2"></i>Create Account
                            </button>
                        </form>

                        <div class="text-center">
                            <p class="text-muted mb-0">
                                Already have an account? 
                                <a href="{{ url_for('login') }}" class="text-accent fw-medium">Login here</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
