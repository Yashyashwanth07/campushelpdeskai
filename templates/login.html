{% extends 'base.html' %}
{% block title %}Login â€” SmartCampus AI{% endblock %}

{% block content %}
<section class="auth-section py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="auth-card card border-0 shadow-lg">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <div class="auth-icon mb-3">
                                <i class="bi bi-box-arrow-in-right"></i>
                            </div>
                            <h3 class="fw-bold">Welcome Back</h3>
                            <p class="text-muted">Sign in to your SmartCampus AI account</p>
                        </div>

                        <form method="POST" action="{{ url_for('login') }}">
                            <div class="mb-3">
                                <label for="email" class="form-label fw-medium">
                                    <i class="bi bi-envelope me-1"></i>Email Address
                                </label>
                                <input type="email" class="form-control form-control-lg" id="email" name="email"
                                    placeholder="you@college.edu" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label fw-medium">
                                    <i class="bi bi-lock me-1"></i>Password
                                </label>
                                <input type="password" class="form-control form-control-lg" id="password"
                                    name="password" placeholder="Enter your password" required>
                            </div>
                            <button type="submit" class="btn btn-accent btn-lg w-100 rounded-pill mb-3">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                            </button>
                        </form>

                        <div class="text-center">
                            <p class="text-muted mb-0">
                                Don't have an account?
                                <a href="{{ url_for('register') }}" class="text-accent fw-medium">Register here</a>
                            </p>
                        </div>

                        <hr class="my-4">
                        <div class="text-center">
                            <small class="text-muted">
                                <i class="bi bi-shield-lock me-1"></i>
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
