{% extends 'base.html' %}
{% block title %}Submit Complaint — SmartCampus AI{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-0 shadow-lg glass-card">
                    <div class="card-body p-5">
                        <div class="d-flex align-items-center mb-4">
                            <div class="feature-icon me-3" style="width:50px;height:50px;font-size:1.2rem;">
                                <i class="bi bi-pencil-square"></i>
                            </div>
                            <div>
                                <h3 class="fw-bold mb-0">Submit a Complaint</h3>
                                <p class="text-muted mb-0">We're here to help. Describe your concern below.</p>
                            </div>
                        </div>

                        <form method="POST" action="{{ url_for('new_complaint') }}" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label for="title" class="form-label fw-medium">
                                    <i class="bi bi-type-h1 me-1"></i>Complaint Title
                                </label>
                                <input type="text" class="form-control form-control-lg" id="title" 
                                       name="title" placeholder="Brief title for your complaint" required>
                            </div>

                            <div class="mb-3">
                                <label for="department" class="form-label fw-medium">
                                    <i class="bi bi-building me-1"></i>Department
                                </label>
                                <select class="form-select form-select-lg" id="department" name="department" required>
                                    <option value="">Select Department</option>
                                    <option value="Hostel">🏠 Hostel</option>
                                    <option value="Faculty">👨‍🏫 Faculty</option>
                                    <option value="Lab">🔬 Lab</option>
                                    <option value="Library">📚 Library</option>
                                    <option value="Canteen">🍽️ Canteen</option>
                                    <option value="Transport">🚌 Transport</option>
                                    <option value="Administration">🏛️ Administration</option>
                                    <option value="Infrastructure">🏗️ Infrastructure</option>
                                    <option value="Other">📋 Other</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label fw-medium">
                                    <i class="bi bi-text-paragraph me-1"></i>Description
                                </label>
                                <textarea class="form-control" id="description" name="description" 
                                          rows="5" placeholder="Describe your complaint in detail..." required></textarea>
                            </div>

                            <!-- AI Suggestion Box -->
                            <div class="ai-suggestion-box mb-4" id="aiSuggestionBox" style="display:none;">
                                <div class="d-flex align-items-start">
                                    <i class="bi bi-robot fs-4 text-primary me-2 mt-1"></i>
                                    <div>
                                        <small class="fw-bold text-primary">AI Suggestion</small>
                                        <p class="mb-0 small" id="aiSuggestionText"></p>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="attachment" class="form-label fw-medium">
                                    <i class="bi bi-paperclip me-1"></i>Attachment (optional)
                                </label>
                                <input type="file" class="form-control" id="attachment" name="attachment"
                                       accept=".png,.jpg,.jpeg,.gif,.pdf,.doc,.docx">
                                <small class="text-muted">Supported: PNG, JPG, GIF, PDF, DOC, DOCX</small>
                            </div>

                            <div class="d-flex gap-3">
                                <button type="submit" class="btn btn-accent btn-lg rounded-pill px-4">
                                    <i class="bi bi-send me-2"></i>Submit Complaint
                                </button>
                                <a href="{{ url_for('my_complaints') }}" class="btn btn-outline-secondary btn-lg rounded-pill px-4">
                                    Cancel
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
